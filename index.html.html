<!DOCTYPE html>
<html lang="nl" data-thema="licht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niels OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Thema variabelen ── */
:root {
  --bg:        #f7f6f3;
  --bg2:       #ffffff;
  --bg3:       #f2f1ee;
  --bg4:       #ebe9e4;
  --border:    rgba(0,0,0,0.07);
  --border-h:  rgba(0,0,0,0.14);
  --shadow:    0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-h:  0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.08);
  --text:      #1a1814;
  --text2:     #6b6760;
  --text3:     #a8a49e;
  --accent:    #2d5be3;
  --accent2:   #e8eeff;
  --green:     #1a7f4b;
  --green-bg:  #edfaf3;
  --amber:     #9a6b00;
  --amber-bg:  #fdf8ed;
  --red:       #c0392b;
  --red-bg:    #fdf0ee;
  --purple:    #6b3fa0;
  --purple-bg: #f4f0fa;
  --sand:      #c8b99a;
  --champagne: #f5f0e8;
  --r: 14px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --sidebar: 224px;
}
[data-thema="donker"] {
  --bg:        #0e0f11;
  --bg2:       #161719;
  --bg3:       #1c1d20;
  --bg4:       #232428;
  --border:    rgba(255,255,255,0.07);
  --border-h:  rgba(255,255,255,0.14);
  --shadow:    0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-h:  0 2px 8px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.3);
  --text:      #f0ede8;
  --text2:     #8c897f;
  --text3:     #4a4845;
  --accent:    #5b8af5;
  --accent2:   #1a2240;
  --green:     #34d399;
  --green-bg:  #0d2b1e;
  --amber:     #fbbf24;
  --amber-bg:  #2a2010;
  --red:       #f87171;
  --red-bg:    #2a1212;
  --purple:    #a78bfa;
  --purple-bg: #1e1530;
  --sand:      #8a7560;
  --champagne: #1e1c18;
}

/* ── Reset & base ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
input,textarea,select,button{font-family:var(--font);}
input,textarea,select{color:var(--text);outline:none;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;width:100%;transition:border-color .15s;}
input:focus,textarea:focus{border-color:var(--accent);}
select{cursor:pointer;}
textarea{resize:vertical;}
button{cursor:pointer;border:none;background:none;}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;z-index:50;}
.main{flex:1;overflow-y:auto;}
.page{max-width:960px;margin:0 auto;padding:40px 36px;}

/* ── Sidebar ── */
.logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.logo-mark{width:36px;height:36px;border-radius:10px;background:var(--text);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--bg);flex-shrink:0;font-family:var(--font-display);}
.logo-name{font-size:13px;font-weight:600;letter-spacing:.04em;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px;}
nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text3);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;}
.ni:hover{background:var(--bg3);color:var(--text2);}
.ni.act{background:var(--accent2);color:var(--accent);font-weight:600;}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sf{padding:16px 20px;border-top:1px solid var(--border);}
.sf-label{font-size:10px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px;}
.sf-score{font-size:26px;font-weight:700;font-family:var(--font-display);color:var(--text);}
.mini-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.mini-fill{height:100%;border-radius:2px;transition:width .6s ease;}

/* Thema schakelaar */
.schakelaar-wrap{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);}
.schakelaar-label{font-size:11px;color:var(--text3);flex:1;}
.schakelaar{width:38px;height:21px;border-radius:11px;background:var(--bg4);position:relative;cursor:pointer;transition:background .2s;border:1px solid var(--border);flex-shrink:0;}
[data-thema="donker"] .schakelaar{background:var(--accent);}
.schakelaar-dot{width:15px;height:15px;border-radius:50%;background:var(--bg2);position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
[data-thema="donker"] .schakelaar-dot{transform:translateX(17px);}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);transition:all .2s;}
.card.klik{cursor:pointer;}
.card.klik:hover{box-shadow:var(--shadow-h);transform:translateY(-1px);border-color:var(--border-h);}

/* ── Typografie ── */
.oogbrow{font-size:10px;color:var(--text3);letter-spacing:.12em;font-weight:500;text-transform:uppercase;margin-bottom:6px;}
.paginatitel{font-size:28px;font-weight:700;font-family:var(--font-display);letter-spacing:-.01em;color:var(--text);}
.sectietitel{font-size:11px;color:var(--text3);letter-spacing:.1em;font-weight:600;text-transform:uppercase;}

/* ── Knoppen ── */
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:var(--text);color:var(--bg);}
.btn-p:hover{opacity:.85;}
.btn-o{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-o:hover{background:var(--bg3);border-color:var(--border-h);}
.btn-a{background:var(--accent2);color:var(--accent);border:1px solid transparent;}
.btn-a:hover{opacity:.8;}
.btn-r{background:var(--red-bg);color:var(--red);}
.btn-r:hover{opacity:.8;}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:8px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}

/* ── Labels/tags ── */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.tag-blauw{background:var(--accent2);color:var(--accent);}
.tag-groen{background:var(--green-bg);color:var(--green);}
.tag-amber{background:var(--amber-bg);color:var(--amber);}
.tag-rood{background:var(--red-bg);color:var(--red);}
.tag-paars{background:var(--purple-bg);color:var(--purple);}
.tag-grijs{background:var(--bg3);color:var(--text2);}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
.flex{display:flex;} .fc{flex-direction:column;} .fw{flex-wrap:wrap;}
.ai{align-items:center;} .jb{justify-content:space-between;} .jc{justify-content:center;}
.f1{flex:1;} .g4p{gap:4px;} .g6{gap:6px;} .g8{gap:8px;} .g10{gap:10px;} .g12{gap:12px;} .g16{gap:16px;}

/* Margin/padding helpers */
.mb4{margin-bottom:4px;} .mb8{margin-bottom:8px;} .mb12{margin-bottom:12px;} .mb16{margin-bottom:16px;} .mb20{margin-bottom:20px;} .mb24{margin-bottom:24px;} .mb28{margin-bottom:28px;} .mb32{margin-bottom:32px;}
.mt4{margin-top:4px;} .mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;}
.p16{padding:16px;} .p20{padding:20px;} .p22{padding:22px;} .p24{padding:24px;}
.tc{text-align:center;}

/* ── Stat kaart ── */
.stat-num{font-size:28px;font-weight:700;font-family:var(--font-display);letter-spacing:-.02em;}
.stat-lbl{font-size:10px;color:var(--text3);letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin-bottom:6px;}
.stat-sub{font-size:12px;color:var(--text3);margin-top:3px;}

/* ── Ring ── */
.ring-wrap{position:relative;flex-shrink:0;}
.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}

/* ── Voortgangsbalk ── */
.vbalk{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px;}
.vvul{height:100%;border-radius:3px;transition:width .6s ease;}
.vbalk-dik{height:8px;}

/* ── Thermometer ── */
.thermo{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;}
.thermo-v{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),#7b6ef6);transition:width .8s ease;}

/* ── Modaal ── */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.12);animation:opDan .2s ease;}
.modal-titel{font-size:20px;font-weight:700;font-family:var(--font-display);margin-bottom:18px;color:var(--text);}
.verborgen{display:none;}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-weight:600;font-size:13px;z-index:300;box-shadow:var(--shadow-h);animation:opDan .2s ease;}
.toast-groen{border-left:3px solid var(--green);color:var(--green);}

/* ── Heatmap ── */
.heatmap{display:grid;grid-template-columns:repeat(15,1fr);gap:3px;margin-top:10px;}
.hm{height:7px;border-radius:2px;background:var(--bg4);}
.hm.aan{background:var(--accent);opacity:.5;}
.hm.done{background:var(--green);opacity:.6;}

/* ── Gewoonte check ── */
.gw-check{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0;cursor:pointer;}
.gw-check.done{border-color:var(--green);background:var(--green-bg);color:var(--green);}

/* ── Prioriteit item ── */
.prio-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.prio-num{width:22px;height:22px;border-radius:6px;background:var(--accent2);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── Doel item ── */
.doel-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.doel-item:hover{box-shadow:var(--shadow-h);transform:translateY(-1px);border-color:var(--border-h);}

/* ── Kanban ── */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.kb-col{background:var(--bg3);border-radius:12px;padding:14px;}
.kb-kop{font-size:10px;color:var(--text3);letter-spacing:.1em;font-weight:700;margin-bottom:10px;text-transform:uppercase;}
.kb-kaart{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.kb-kaart:hover{box-shadow:var(--shadow-h);}

/* ── Skill balk ── */
.skill-balk{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px;}
.skill-vul{height:100%;border-radius:3px;transition:width .6s ease;}

/* ── Kalender strip ── */
.cal-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cel{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.cal-goed{background:var(--green-bg);color:var(--green);}
.cal-slecht{background:var(--red-bg);color:var(--red);}
.cal-leeg{background:var(--bg3);color:var(--text3);}
.cal-vandaag{border:2px solid var(--accent);color:var(--accent);}

/* ── Overwinning item ── */
.win-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}

/* ── WEEK OS ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px;}
.dag-kolom{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:all .2s;}
.dag-kolom.vandaag{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent2),var(--shadow);}
.dag-header{padding:10px 10px 8px;text-align:center;border-bottom:1px solid var(--border);}
.dag-naam{font-size:10px;color:var(--text3);letter-spacing:.08em;font-weight:600;text-transform:uppercase;}
.dag-num{font-size:18px;font-weight:700;font-family:var(--font-display);color:var(--text);line-height:1.2;}
.dag-num.vandaag{color:var(--accent);}
.dag-body{padding:8px;}
.dag-slot{background:var(--bg3);border-radius:7px;padding:7px 8px;margin-bottom:5px;font-size:11px;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative;}
.dag-slot:hover{border-color:var(--border-h);background:var(--bg4);}
.dag-slot.werk{background:var(--accent2);border-color:rgba(45,91,227,.15);}
.dag-slot.gym{background:var(--green-bg);border-color:rgba(26,127,75,.15);}
.dag-slot.persoonlijk{background:var(--purple-bg);border-color:rgba(107,63,160,.15);}
.dag-slot.gedaan{opacity:.5;text-decoration:line-through;}
.slot-tijd{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:2px;}
.slot-tekst{font-weight:500;color:var(--text);line-height:1.3;}
.slot-verwijder{position:absolute;top:4px;right:5px;font-size:14px;color:var(--red);opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;line-height:1;}
.dag-slot:hover .slot-verwijder{opacity:.7;}
.dag-voeg-toe{width:100%;padding:6px;border-radius:7px;font-size:11px;color:var(--text3);background:none;border:1px dashed var(--border);cursor:pointer;transition:all .15s;margin-top:2px;}
.dag-voeg-toe:hover{background:var(--bg3);color:var(--text2);border-color:var(--border-h);}

/* Sectie blokken week */
.sectie-blok{padding:7px 0;border-bottom:1px solid var(--border);}
.sectie-label{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px;}

/* Pomodoro */
.pomo-ring{position:relative;width:140px;height:140px;margin:0 auto;}
.pomo-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pomo-tijd{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--text);}
.pomo-modus{font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}

/* Wheel of life */
.wheel-wrap{display:flex;justify-content:center;margin:12px 0;}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.ftab{padding:5px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.ftab:hover{background:var(--bg3);}
.ftab.act{background:var(--accent2);color:var(--accent);border-color:transparent;}

/* Sectie kop */
.skop{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;}

/* Divider */
.div{height:1px;background:var(--border);margin:16px 0;}

/* Streak badge */
.streak{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--amber);font-weight:600;}

/* Week stats balk */
.week-stat-balk{display:flex;gap:8px;}
.wstat{flex:1;background:var(--bg3);border-radius:10px;padding:14px;text-align:center;}
.wstat-num{font-size:20px;font-weight:700;font-family:var(--font-display);}
.wstat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* Verwijder knop inline */
.del-btn{background:none;border:none;color:var(--red);font-size:17px;cursor:pointer;padding:0 3px;line-height:1;opacity:.5;transition:opacity .15s;}
.del-btn:hover{opacity:1;}

/* Ambient */
.amb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;}
.amb1{top:-10%;right:-5%;width:400px;height:400px;background:radial-gradient(circle,rgba(45,91,227,.04) 0%,transparent 70%);}
.amb2{bottom:-10%;left:-5%;width:350px;height:350px;background:radial-gradient(circle,rgba(107,63,160,.03) 0%,transparent 70%);}
[data-thema="donker"] .amb1{background:radial-gradient(circle,rgba(91,138,245,.04) 0%,transparent 70%);}
[data-thema="donker"] .amb2{background:radial-gradient(circle,rgba(167,139,250,.03) 0%,transparent 70%);}

/* Animaties */
@keyframes opDan{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.f1a{animation:opDan .3s ease both;}
.f2a{animation:opDan .35s .06s ease both;}
.f3a{animation:opDan .35s .12s ease both;}
.f4a{animation:opDan .35s .18s ease both;}

/* Mobiel */
.bottom-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0 12px;z-index:50;}
.bb-items{display:flex;justify-content:space-around;}
.bb-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 10px;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;border:none;background:none;transition:all .15s;}
.bb-item.act{color:var(--accent);}

@media(max-width:900px){
  .week-grid{grid-template-columns:repeat(4,1fr);}
  .g4{grid-template-columns:repeat(2,1fr);}
  .kanban{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:700px){
  .sidebar{display:none;}
  .bottom-bar{display:block;}
  .main{padding-bottom:80px;}
  .page{padding:24px 18px;}
  .g3,.g2{grid-template-columns:1fr;}
  .week-grid{grid-template-columns:repeat(3,1fr);}
  .skop{flex-direction:column;align-items:flex-start;gap:12px;}
}
@media(max-width:480px){
  .g4,.ga{grid-template-columns:1fr 1fr;}
  .week-grid{grid-template-columns:1fr 1fr;}
  .kanban{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="amb amb1"></div>
<div class="amb amb2"></div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">N</div>
      <div>
        <div class="logo-name">Niels OS</div>
        <div class="logo-sub" id="sb-datum"></div>
      </div>
    </div>
    <div class="schakelaar-wrap">
      <span class="schakelaar-label" id="thema-lbl">☀️ Licht thema</span>
      <div class="schakelaar" onclick="wisselThema()" title="Thema wisselen"><div class="schakelaar-dot"></div></div>
    </div>
    <nav id="sb-nav"></nav>
    <div class="sf">
      <div class="sf-label">Levensscore</div>
      <div class="sf-score" id="sb-score">0<span style="font-size:14px;font-weight:400;color:var(--text3)">%</span></div>
      <div class="mini-bar"><div class="mini-fill" id="sb-balk" style="width:0%;background:var(--accent)"></div></div>
    </div>
  </aside>

  <main class="main" id="inhoud"></main>

  <div class="bottom-bar">
    <div class="bb-items" id="bb-nav"></div>
  </div>

function ring(pct,size,stroke,kleur) {
  const r=(size-stroke*2)/2, circ=2*Math.PI*r, dash=(Math.min(100,pct)/100)*circ;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${kleur}" stroke-width="${stroke}"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .8s"/>
    </svg>
    <div class="ring-lbl" style="color:${kleur};font-size:${size>55?11:9}px">${Math.round(pct)}%</div>
  </div>`;
}

function pgWeek() {
  if(!D.weekTaken) D.weekTaken=genWeekTaken();
  if(!D.weekDoelen) D.weekDoelen=[];
  const huidigeDag=huidigeWeekdag();
  const maandag=getMaandag();

  // Week statistieken
  const alleTaken=DAGN.flatMap(d=>D.weekTaken[d]||[]);
  const gedaan=alleTaken.filter(t=>t.gedaan).length;
  const totaal=alleTaken.length;
  const gymDagen=DAGN.filter(d=>(D.weekTaken[d]||[]).some(t=>t.type==='gym'&&t.gedaan)).length;

  const weekDagen=DAGN.map((dk,di)=>{
    const datum=new Date(maandag); datum.setDate(datum.getDate()+di);
    const isVandaag=dk===huidigeDag;
    const taken=(D.weekTaken[dk]||[]);

function getMaandag() {

// WHEEL OF LIFE SVG
// ══════════════════════════════════════════════════════════
function wheelSVG(scores) {
  const cats=Object.keys(scores), n=cats.length, cx=150,cy=150,maxR=110,size=300;
  const kleuren=['#2d5be3','#1a7f4b','#9a6b00','#6b3fa0','#c0392b','#0891b2','#c2410c','#be185d'];
  let paths='',labels='',axes='';
  cats.forEach((cat,i)=>{
    const a=(i/n)*2*Math.PI-Math.PI/2, na=((i+1)/n)*2*Math.PI-Math.PI/2;
    const r=(scores[cat]/10)*maxR;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(na),y2=cy+r*Math.sin(na);
    const lx=cx+(maxR+22)*Math.cos(a),ly=cy+(maxR+22)*Math.sin(a),ax=cx+maxR*Math.cos(a),ay=cy+maxR*Math.sin(a);
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z" fill="${kleuren[i]}" fill-opacity=".2" stroke="${kleuren[i]}" stroke-width="1.5"/>`;
    axes+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--border)" stroke-width="1"/>`;
    labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--text2)" font-size="9" font-family="DM Sans,sans-serif" font-weight="500">${cat}</text>`;
  });
  [2,4,6,8,10].forEach(v=>{const r=(v/10)*maxR;axes+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="1"/>`;});
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${axes}${paths}${labels}</svg>`;
}

function initPomo(){updatePomo();}
function updatePomo(){
  const t=document.getElementById('pomo-t'),c=document.getElementById('pomo-c'),m=document.getElementById('pomo-m'),b=document.getElementById('pomo-btn');
  if(!t)return;
  const min=Math.floor(pomoSec/60).toString().padStart(2,'0'),sec=(pomoSec%60).toString().padStart(2,'0');
  t.textContent=`${min}:${sec}`;
  const totaal=D.pomoDuur*60,pct=pomoSec/totaal,circ=2*Math.PI*62;
  c.setAttribute('stroke-dasharray',`${pct*circ} ${circ}`);
  c.setAttribute('stroke',pomoModus==='werk'?'var(--accent)':'var(--green)');
  if(m)m.textContent=pomoModus==='werk'?'WERKTIJD':'PAUZE';
  if(b)b.textContent=pomoLoopt?'⏸ Pauze':'▶ Start';
}
function togglePomo(){
  if(pomoLoopt){clearInterval(pomoInterval);pomoLoopt=false;}
  else{pomoLoopt=true;pomoInterval=setInterval(()=>{pomoSec--;if(pomoSec<=0){clearInterval(pomoInterval);pomoLoopt=false;if(pomoModus==='werk'){pomoModus='pauze';pomoSec=5*60;toonMelding('🎉 Werktijd klaar! Pauze.');}else{pomoModus='werk';pomoSec=D.pomoDuur*60;toonMelding('⚡ Pauze klaar! Aan het werk.');}}updatePomo();},1000);}
  updatePomo();
}
function resetPomo(){clearInterval(pomoInterval);pomoLoopt=false;pomoModus='werk';pomoSec=D.pomoDuur*60;updatePomo();}
function zetPomo(min){D.pomoDuur=min;pomoSec=min*60;resetPomo();}

// Automatisch dag beoordelen op basis van gewoontes (≥70% = goed, anders slecht)
function bereken_dag_score() {
  const ged = D.gewoontes.filter(g => g.vandaag).length;
  const tot = D.gewoontes.length || 1;
  const pct = Math.round((ged / tot) * 100);
  const score = pct >= 70 ? 'goed' : 'slecht';
  D.kalender[vandaag()] = score;
  return { pct, score };
}

function zetKal(k) {
  // Handmatig overschrijven mag nog steeds (klik op kalendercel)
  const h = D.kalender[k];
  D.kalender[k] = h === 'goed' ? 'slecht' : h === 'slecht' ? undefined : 'goed';
  if (!D.kalender[k]) delete D.kalender[k];
  opslaan(); render();
}

function markeerDag() {
  const { pct, score } = bereken_dag_score();
  const drempel = 70;
  opslaan();
  openModaal(`<div class="modal-titel">Dag automatisch beoordeeld</div>

  try { return JSON.parse(localStorage.getItem('nos-gebruikers')) || {}; } catch { return {}; }
}

  localStorage.setItem('nos-gebruikers', JSON.stringify(g));
}

}
function setIngelogd(gebruikersnaam) {
  localStorage.setItem('nos-sessie', gebruikersnaam);
}
function uitloggen() {
  localStorage.removeItem('nos-sessie');
  location.reload();
}

    fout.textContent = '';
    if (code !== UITNODIGINGSCODE) { fout.textContent = 'Uitnodigingscode klopt niet.'; return; }
    if (!gebruiker || gebruiker.length < 3) { fout.textContent = 'Gebruikersnaam moet minimaal 3 tekens zijn.'; return; }
    if (!naam) { fout.textContent = 'Vul je naam in.'; return; }
    if (wachtwoord.length < 6) { fout.textContent = 'Wachtwoord moet minimaal 6 tekens zijn.'; return; }
    const gebruikers = laadGebruikers();
    if (gebruikers[gebruiker]) { fout.textContent = 'Deze gebruikersnaam is al bezet.'; return; }
    gebruikers[gebruiker] = { wachtwoord: btoa(wachtwoord), naam };
    slaGebruikersOp(gebruikers);
    setIngelogd(gebruiker);
    location.reload();
  };
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
// Controleer of ingelogd
const _sessie = getIngelogd();
if (!_sessie) {
  toonLoginScherm();
} else {
  // Laad naam uit gebruikersprofiel
  const _gebruikers = laadGebruikers();
  const _profiel = _gebruikers[_sessie];

  // Overschrijf de data sleutel met gebruiker-specifieke sleutel
  const SK_OVERRIDE = getUserSleutel(_sessie);
  function laad() { try { return JSON.parse(localStorage.getItem(SK_OVERRIDE)) || basis(); } catch { return basis(); } }
  function opslaan() { localStorage.setItem(SK_OVERRIDE, JSON.stringify(D)); herbereken(); renderSB(); }

  // Zet naam op profielnaam als eerste keer
  D = laad();
  if (_profiel && D.naam === 'Niels' && _profiel.naam !== 'Niels') {
    D.naam = _profiel.naam;
  }

  // Voeg uitlogknop toe aan sidebar footer
  const _origRenderSB = renderSB;
  renderSB = function() {
    _origRenderSB();
    const sf = document.querySelector('.sf');
    if (sf && !document.getElementById('uitlog-btn')) {
      const btn = document.createElement('button');
      btn.id = 'uitlog-btn';
      btn.className = 'btn btn-o btn-sm';
      btn.style.cssText = 'width:100%;margin-top:12px;font-size:11px;';
      btn.textContent = `↩ Uitloggen (${_sessie})`;
      btn.onclick = uitloggen;
      sf.appendChild(btn);
    }
  };

  herbereken();
  renderSB();
  render();
}
</script>
</body>
